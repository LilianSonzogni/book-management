name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test testIntegration testComponent testArchitecture

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: 'build/test-results/test/*.xml,build/test-results/testIntegration/*.xml,build/test-results/testComponent/*.xml,build/test-results/testArchitecture/*.xml'
          reporter: java-junit

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: build/reports/cucumber.html

      - name: Generate JaCoCo report
        run: ./gradlew jacocoTestReport

      - name: Publish JaCoCo report in pipeline
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Rapport de couverture JaCoCo

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: Run mutation tests
        run: ./gradlew pitest

      - name: Upload PIT mutation report
        uses: actions/upload-artifact@v4
        with:
          name: pitest-report
          path: build/reports/pitest/

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/

